services:
  - type: web
    name: video-uniquifier
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false

  - type: redis
    name: redis
    plan: free
    ipAllowList: []

databases:
  - name: postgres
    plan: free
    databaseName: videouniquifier
    user: videouser
