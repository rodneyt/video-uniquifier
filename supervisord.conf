[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0

[program:api]
command=uvicorn api.main:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# Worker DISABLED on Render — runs locally on your PC with GPU
# To re-enable on Render, uncomment below:
# [program:worker]
# command=rq worker video_jobs --url %(ENV_REDIS_URL)s
